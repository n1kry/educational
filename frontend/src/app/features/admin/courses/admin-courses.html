<h2>Все курсы</h2>

@if (loading) {
  <div class="center"><mat-spinner /></div>
} @else {

<table mat-table [dataSource]="courses" class="courses-table mat-elevation-z2">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let c">{{ c.id }}</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Название</th>
    <td mat-cell *matCellDef="let c">{{ c.title }}</td>
  </ng-container>

  <ng-container matColumnDef="teacher">
    <th mat-header-cell *matHeaderCellDef>Преподаватель</th>
    <td mat-cell *matCellDef="let c">{{ c.teacherName }}</td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef>Категория</th>
    <td mat-cell *matCellDef="let c">{{ c.category }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Статус</th>
    <td mat-cell *matCellDef="let c">
      <mat-chip [class]="c.published ? 'chip-pub' : 'chip-draft'">
        {{ c.published ? 'Опубликован' : 'Черновик' }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="sections">
    <th mat-header-cell *matHeaderCellDef>Разделов</th>
    <td mat-cell *matCellDef="let c">{{ c.sectionCount }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let c">
      <button mat-icon-button color="warn" (click)="delete(c.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

}
