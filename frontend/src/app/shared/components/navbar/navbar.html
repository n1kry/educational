<mat-toolbar color="primary">
  <a routerLink="/" class="brand">EduPlatform</a>

  <span class="spacer"></span>

  <a mat-button routerLink="/courses" routerLinkActive="active-link">Курсы</a>

  @if (auth.isLoggedIn()) {
    <a mat-button routerLink="/my-courses" routerLinkActive="active-link">Мои курсы</a>

    @if (auth.role() === 'TEACHER' || auth.role() === 'ADMIN') {
      <a mat-button routerLink="/teacher" routerLinkActive="active-link">Кабинет учителя</a>
    }

    @if (auth.role() === 'ADMIN') {
      <a mat-button routerLink="/admin" routerLinkActive="active-link">Админ</a>
    }

    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      {{ auth.user()?.name }}
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="auth.logout()">
        <mat-icon>logout</mat-icon>
        Выйти
      </button>
    </mat-menu>
  } @else {
    <a mat-button routerLink="/login">Войти</a>
    <a mat-flat-button routerLink="/register">Регистрация</a>
  }
</mat-toolbar>
