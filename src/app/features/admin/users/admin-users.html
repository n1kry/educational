<h2>Управление пользователями</h2>

@if (loading) {
  <div class="center"><mat-spinner /></div>
} @else {

<table mat-table [dataSource]="users" class="users-table mat-elevation-z2">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let u">{{ u.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Имя</th>
    <td mat-cell *matCellDef="let u">{{ u.name }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let u">{{ u.email }}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Роль</th>
    <td mat-cell *matCellDef="let u">
      <mat-select [value]="u.role" (selectionChange)="changeRole(u, $event.value)" class="role-select">
        @for (r of roles; track r) {
          <mat-option [value]="r">{{ r }}</mat-option>
        }
      </mat-select>
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Статус</th>
    <td mat-cell *matCellDef="let u">
      <mat-chip [class]="u.active ? 'chip-active' : 'chip-blocked'">
        {{ u.active ? 'Активен' : 'Заблокирован' }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Действия</th>
    <td mat-cell *matCellDef="let u">
      <button mat-icon-button
              [color]="u.active ? 'warn' : 'primary'"
              [matTooltip]="u.active ? 'Заблокировать' : 'Активировать'"
              (click)="toggleActive(u)">
        <mat-icon>{{ u.active ? 'block' : 'check_circle' }}</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

}
